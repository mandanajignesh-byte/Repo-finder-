name: Update Trending Repos

on:
  schedule:
    - cron: '0 6 * * *'    # daily at 06:00 UTC
    - cron: '0 7 * * 0'    # weekly at 07:00 UTC on Sundays
  workflow_dispatch:
    inputs:
      period:
        description: 'Period to run: daily | weekly | both'
        required: false
        default: 'both'

jobs:
  update-trending:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install script dependencies
        working-directory: RepoFinderMobile
        run: npm install

      - name: Run daily trending update
        if: >-
          github.event.schedule == '0 6 * * *' ||
          github.event.inputs.period == 'daily' ||
          github.event.inputs.period == 'both' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.period == '')
        working-directory: RepoFinderMobile
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_API_TOKENS: ${{ secrets.GH_API_TOKENS }}
        run: node update-trending-repos.js --period=daily

      - name: Run weekly trending update
        if: >-
          github.event.schedule == '0 7 * * 0' ||
          github.event.inputs.period == 'weekly' ||
          github.event.inputs.period == 'both'
        working-directory: RepoFinderMobile
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_API_TOKENS: ${{ secrets.GH_API_TOKENS }}
        run: node update-trending-repos.js --period=weekly
