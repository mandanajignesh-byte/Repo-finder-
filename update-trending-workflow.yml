# =====================================================
# UPDATE DAILY TRENDING REPOS WORKFLOW
# Copy this to .github/workflows/main.yml in your Repo-finder- repository
# =====================================================
name: Update Daily Trending Repos

on:
  schedule:
    # Run at 6 AM UTC daily (adjust for your timezone)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update-trending:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js node-fetch

      - name: Update Trending Repos
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node << 'EOF'
          const { createClient } = require('@supabase/supabase-js');

          const supabase = createClient(
            process.env.SUPABASE_URL,
            process.env.SUPABASE_SERVICE_KEY
          );

          // Blocked generic repos - too popular for discovery
          const BLOCKED_REPOS = new Set([
            'facebook/react', 'facebook/react-native', 'microsoft/vscode',
            'microsoft/TypeScript', 'google/material-design-icons', 'vuejs/vue',
            'angular/angular', 'nodejs/node', 'tensorflow/tensorflow',
            'pytorch/pytorch', 'kubernetes/kubernetes', 'golang/go',
            'rust-lang/rust', 'python/cpython', 'torvalds/linux',
            'freeCodeCamp/freeCodeCamp', 'EbookFoundation/free-programming-books',
            'sindresorhus/awesome', 'public-apis/public-apis', 'flutter/flutter',
            'laravel/laravel', 'django/django', 'rails/rails', 'vercel/next.js',
            'spring-projects/spring-boot', 'elastic/elasticsearch', 'redis/redis',
            'ohmyzsh/ohmyzsh', 'github/gitignore', 'home-assistant/core',
            'grafana/grafana', 'prometheus/prometheus', 'ansible/ansible',
            'hashicorp/terraform', 'helm/helm', 'apache/kafka'
          ]);

          // Categories based on language
          const LANGUAGE_CATEGORIES = {
            'python': 'ai-ml',
            'jupyter notebook': 'ai-ml',
            'typescript': 'web-dev',
            'javascript': 'web-dev',
            'vue': 'web-dev',
            'html': 'web-dev',
            'css': 'web-dev',
            'go': 'devops',
            'rust': 'systems',
            'c': 'systems',
            'c++': 'systems',
            'java': 'backend',
            'kotlin': 'mobile',
            'swift': 'mobile',
            'dart': 'mobile',
            'ruby': 'backend',
            'php': 'backend',
            'shell': 'devops',
            'dockerfile': 'devops'
          };

          function getCategory(language) {
            if (!language) return 'general';
            return LANGUAGE_CATEGORIES[language.toLowerCase()] || 'general';
          }

          async function fetchGitHubTrending(since = 'daily') {
            // Using GitHub's search API to get trending-like results
            const dateRange = since === 'daily' ? 1 : 7;
            const date = new Date();
            date.setDate(date.getDate() - dateRange);
            const dateStr = date.toISOString().split('T')[0];

            const response = await fetch(
              `https://api.github.com/search/repositories?q=created:>${dateStr}+stars:>50&sort=stars&order=desc&per_page=100`,
              {
                headers: {
                  'Authorization': `token ${process.env.GITHUB_TOKEN}`,
                  'Accept': 'application/vnd.github.v3+json',
                  'User-Agent': 'TrendingRepoBot'
                }
              }
            );

            if (!response.ok) {
              throw new Error(`GitHub API error: ${response.status}`);
            }

            const data = await response.json();
            return data.items || [];
          }

          async function processTrending(periodType) {
            console.log(`\n📊 Processing ${periodType} trending repos...`);
            
            const since = periodType === 'daily' ? 'daily' : 'weekly';
            const repos = await fetchGitHubTrending(since);
            
            // For daily: use yesterday's date (since data is from yesterday)
            // For weekly: use last week's end date
            const targetDate = new Date();
            if (periodType === 'daily') {
              targetDate.setDate(targetDate.getDate() - 1);
            } else {
              targetDate.setDate(targetDate.getDate() - 7);
            }
            const periodDate = targetDate.toISOString().split('T')[0];

            console.log(`📅 Period date: ${periodDate}`);
            console.log(`🔍 Found ${repos.length} repos from GitHub API`);

            // Filter out blocked repos
            const filteredRepos = repos.filter(repo => !BLOCKED_REPOS.has(repo.full_name));
            console.log(`✅ After filtering: ${filteredRepos.length} repos`);

            // Delete old data for this period type (older than 3 days)
            const { error: deleteOldError } = await supabase
              .from('trending_repos')
              .delete()
              .eq('period_type', periodType)
              .lt('period_date', new Date(Date.now() - 3 * 24 * 60 * 60 * 1000).toISOString().split('T')[0]);
            
            if (deleteOldError) {
              console.warn('⚠️ Error deleting old data:', deleteOldError.message);
            }

            // Delete existing data for this specific date to avoid duplicates
            const { error: deleteError } = await supabase
              .from('trending_repos')
              .delete()
              .eq('period_type', periodType)
              .eq('period_date', periodDate);
            
            if (deleteError) {
              console.warn('⚠️ Error deleting existing data:', deleteError.message);
            }

            // Insert new trending data
            const trendingData = filteredRepos.slice(0, 50).map((repo, index) => ({
              repo_id: repo.id,
              period_type: periodType,
              period_date: periodDate,
              rank: index + 1,
              trending_score: Math.max(0, 100 - index * 2),
              star_velocity: repo.stargazers_count,
              category: getCategory(repo.language)
            }));

            if (trendingData.length > 0) {
              const { error: insertError } = await supabase
                .from('trending_repos')
                .insert(trendingData);
              
              if (insertError) {
                console.error('❌ Error inserting data:', insertError.message);
              } else {
                console.log(`✅ Inserted ${trendingData.length} ${periodType} trending repos for ${periodDate}`);
              }
            }

            // Also ensure repos exist in repos_master
            for (const repo of filteredRepos.slice(0, 50)) {
              const { error: upsertError } = await supabase
                .from('repos_master')
                .upsert({
                  github_id: repo.id,
                  name: repo.name,
                  full_name: repo.full_name,
                  description: repo.description,
                  owner_login: repo.owner.login,
                  avatar_url: repo.owner.avatar_url,
                  language: repo.language,
                  stars: repo.stargazers_count,
                  forks: repo.forks_count,
                  watchers: repo.watchers_count,
                  open_issues: repo.open_issues_count,
                  topics: repo.topics || [],
                  license: repo.license?.spdx_id || null,
                  repo_url: repo.html_url,
                  homepage_url: repo.homepage,
                  created_at: repo.created_at,
                  updated_at: repo.updated_at,
                  pushed_at: repo.pushed_at,
                  archived: repo.archived || false
                }, { onConflict: 'github_id' });
              
              if (upsertError) {
                console.warn(`⚠️ Error upserting repo ${repo.full_name}:`, upsertError.message);
              }
            }
          }

          async function main() {
            console.log('🚀 Starting trending repos update...');
            console.log(`📅 Current date: ${new Date().toISOString()}`);
            
            try {
              // Process both daily and weekly
              await processTrending('daily');
              await processTrending('weekly');
              
              console.log('\n✅ Trending update complete!');
            } catch (error) {
              console.error('❌ Error:', error.message);
              process.exit(1);
            }
          }

          main();
          EOF

      - name: Verify Data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node << 'EOF'
          const { createClient } = require('@supabase/supabase-js');

          const supabase = createClient(
            process.env.SUPABASE_URL,
            process.env.SUPABASE_SERVICE_KEY
          );

          async function verify() {
            const { data, error } = await supabase
              .from('trending_repos')
              .select('period_type, period_date')
              .order('period_date', { ascending: false })
              .limit(10);
            
            if (error) {
              console.error('Error:', error.message);
            } else {
              console.log('Recent trending data:');
              const grouped = {};
              data.forEach(row => {
                const key = `${row.period_type} - ${row.period_date}`;
                grouped[key] = (grouped[key] || 0) + 1;
              });
              Object.entries(grouped).forEach(([key, count]) => {
                console.log(`  ${key}: ${count} repos`);
              });
            }
          }

          verify();
          EOF
